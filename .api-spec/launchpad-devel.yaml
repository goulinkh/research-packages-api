          schema:
            type: string
            enum:
              - Release
              - Security
              - Updates
              - Proposed
              - Backports
        - name: exact_match
          in: query
          required: false
          description: Exact Match Whether or not to filter source names by exact matching.
          schema:
            type: string
        - name: created_since_date
          in: query
          required: false
          description: Created Since Date Return entries whose date_created is greater than or equal to this date.
          schema:
            type: string
        - name: published_since
          in: query
          required: false
          description: Published Since Return entries whose date_published is greater than or equal to this date.
