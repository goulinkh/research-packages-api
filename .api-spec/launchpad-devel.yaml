  /people?ws.op=findPerson:
    get:
      tags:
        - people
      summary: Find person
      description: Return all non-merged Persons with at least one email address whose name, displayname or email address match <text>. If text is an empty string, all persons with at least one email address will be returned. The results will be ordered using the default ordering specified in Person._defaultOrder. If exclude_inactive_accounts is True, any accounts whose account_status is any of INACTIVE_ACCOUNT_STATUSES will not be in the returned set. If must_have_email is True, only people with one or more email addresses are returned. While we don't have Full Text Indexes in the emailaddress table, we'll be trying to match the text only against the beginning of an email address. If created_before or created_after are not None, they are used to restrict the search to the dates provided.
      operationId: people-findPerson
      parameters:
        - name: text
          in: query
          required: true
          description: Search text
          schema:
            type: string
          example: ubuntu
        - name: created_after
          in: query
          required: false
          description: Created after
          schema:
            type: string
        - name: created_before
          in: query
          required: false
          description: Created before
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/person-page"
