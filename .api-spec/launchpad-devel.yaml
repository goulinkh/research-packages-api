      description: Cancel the build if it is either pending or in progress. Check the can_be_cancelled property prior to calling this method to find out if cancelling the build is possible. If the build is in progress, it is marked as CANCELLING until the buildd manager terminates the build and marks it CANCELLED. If the build is not in progress, it is marked CANCELLED immediately and is removed from the build queue. If the build is not in a cancellable state, this method is a no-op.
