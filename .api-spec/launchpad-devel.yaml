  /{distribution}/{series}?ws.op=initDerivedDistroSeries:
    post:
      tags:
        - distro_series
      summary: Init derived distro series
      description: "Initialize this series from parents. This method performs checks and then creates a job to populate the new distroseries. param parents: The list of parent ids this series will derive from. param architectures: The architectures to copy to the derived series. If not specified, all of the architectures are copied. param archindep_archtag: The architecture tag used to build architecture-independent packages. If not specified, one from the parents' will be used. param packagesets: The packagesets to copy to the derived series. If not specified, all of the packagesets are copied. param rebuild: Whether binaries will be copied to the derived series. If it's true, they will not be, and if it's false, they will be. param overlays: A list of booleans indicating, for each parent, if the parent/child relationship should be an overlay. param overlay_pockets: The list of pockets names to use for overlay relationships. param overlay_components: The list of components names to use for overlay relationships."
      operationId: distro_series-initDerivedDistroSeries
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                parents:
                  type: string
                  description: The list of parents to derive from.
                  example: parents
                architectures:
                  type: string
                  description: The list of architectures to copy to the derived distroseries.
                archindep_archtag:
                  type: string
                  description: Architecture tag to build architecture-independent packages.
                packagesets:
                  type: string
                  description: The list of packagesets to copy to the derived distroseries
                rebuild:
                  type: string
                  description: If binaries will be copied to the derived distroseries.
                overlays:
                  type: string
                  description: The list of booleans indicating, for each parent, if the parent/child relationship should be an overlay.
                overlay_pockets:
                  type: string
                  description: The list of overlay pockets.
                overlay_components:
                  type: string
                  description: The list of overlay components.
              required:
                - parents
      parameters:
        - *a54
        - *a55
      responses:
        "200":
          description: Successful response
