          required: false
          description: Omit bugs marked as duplicate,
          schema:
            type: string
        - name: status_upstream
          in: query
          required: false
          description: "Status upstream Indicates the status of any remote watches associated with the bug. Possible values include: pending_bugwatch, hide_upstream, resolved_upstream, and open_upstream."
          schema:
            type: string
        - name: milestone
          in: query
          required: false
          description: Milestone Show only bug tasks targeted to this milestone.
          schema:
            type: string
        - name: component
          in: query
          required: false
          description: Component Distribution package archive grouping. E.g. main, universe, multiverse
          schema:
            type: string
        - name: nominated_for
          in: query
          required: false
          schema:
            type: string
            format: uri
            x-lp-resource-type: distro_series
        - name: has_no_package
          in: query
          required: false
          description: Exclude bugs with packages specified
          schema:
            type: string
        - name: linked_branches
          in: query
          required: false
          description: Search for bugs that are linked to branches or for bugs that are not linked to branches.
          schema:
            type: string
            enum:
              - Show all bugs
              - Show only Bugs with linked Branches
              - Show only Bugs without linked Branches
        - name: modified_since
          in: query
          required: false
          description: Search for bugs that have been modified since the given date.
          schema:
            type: string
        - name: created_since
          in: query
          required: false
          description: Search for bugs that have been created since the given date.
          schema:
            type: string
        - name: created_before
          in: query
          required: false
          description: Search for bugs that were created before the given date.
          schema:
            type: string
        - name: omit_targeted
          in: query
          required: false
          description: Omit bugs targeted to a series
          schema:
            type: string
        - name: linked_blueprints
          in: query
          required: false
          description: Search for bugs that are linked to blueprints or for bugs that are not linked to blueprints.
          schema:
            type: string
            enum:
              - Show all bugs
              - Show only Bugs with linked Blueprints
              - Show only Bugs without linked Blueprints
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bug_task-page"
