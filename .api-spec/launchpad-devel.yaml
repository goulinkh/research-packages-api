  /projects?ws.op=new_project:
    post:
      tags:
        - projects
      summary: New project
      description: Create and return a brand new Product. See IProduct for a description of the parameters.
      operationId: projects-new_project
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Name At least one lowercase letter or number, followed by letters, numbers, dots, hyphens or pluses. Keep this name short; it is used in URLs as shown above.
                  example: ubuntu
                display_name:
                  type: string
                  description: Display Name The name of the project as it would appear in a paragraph.
                  example: display_name
                title:
                  type: string
                  description: Title The project title. Should be just a few words.
                  example: title
                summary:
                  type: string
                  description: Summary A short paragraph to introduce the project's work.
                  example: summary
                description:
                  type: string
                  description: Description Details about the project's work, highlights, goals, and how to contribute. Use plain text, paragraphs are preserved and URLs are linked in pages. Don't repeat the Summary.
                project_group:
                  type: string
                  format: uri
                  x-lp-resource-type: project_group
                  description: Part of Project group. This is an overarching initiative that includes several related projects. For example, the Mozilla Project produces Firefox, Thunderbird and Gecko. This information is used to group those projects in a coherent way. If you make this project part of a group, the group preferences and decisions around bug tracking, translation and security policy will apply to this project.
                home_page_url:
                  type: string
                  description: Homepage URL The project home page. Please include the http://
                screenshots_url:
                  type: string
                  description: Screenshots URL The full URL for screenshots of this project, if available. Please include the http://
                download_url:
                  type: string
                  description: Download URL The full URL where downloads for this project are located, if available. Please include the http://
                freshmeat_project:
                  type: string
                  description: Freshmeat Project The Freshmeat project name for this project, if it is in freshmeat. [DEPRECATED]
                wiki_url:
                  type: string
                  description: Wiki URL The full URL of this project's wiki, if it has one. Please include the http://
                sourceforge_project:
                  type: string
                  description: Sourceforge Project The SourceForge project name for this project, if it is in sourceforge.
                programming_lang:
                  type: string
                  description: Programming Languages A comma delimited list of programming languages used for this project.
                project_reviewed:
                  type: string
                  description: Project reviewed Whether or not this project has been reviewed. If you looked at the project and how it uses Launchpad, you reviewed it.
                licenses:
                  type: string
                  description: Licences
                license_info:
                  type: string
                  description: Description of additional licences Description of licences that do not appear in the list above.
                registrant:
                  type: string
                  format: uri
                  x-lp-resource-type: person
                  description: Registrant This person registered the project in Launchpad.
                bug_supervisor:
                  type: string
                  format: uri
                  x-lp-resource-type: person
                  description: Bug Supervisor The Launchpad id of the person or team (preferred) responsible for bug management.
                driver:
                  type: string
                  format: uri
                  x-lp-resource-type: person
                  description: Driver This person or team will be able to set feature goals for and approve bug targeting or backporting for ANY major series in this project. You might want to leave this blank and just appoint a team for each specific series, rather than having one project team that does it all.
              required:
                - name
                - display_name
                - title
                - summary
      responses:
        "200":
          description: Successful response
