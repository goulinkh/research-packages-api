      summary: Get build counters
      description: "Return a dictionary containing the build counters for an archive. This is necessary currently because the IArchive.failed_builds etc. counters are not in use. The returned dictionary contains the following keys and values: 'total': total number of builds (includes SUPERSEDED); 'pending': number of builds in BUILDING or NEEDSBUILD state; 'failed': number of builds in FAILEDTOBUILD, MANUALDEPWAIT, CHROOTWAIT and FAILEDTOUPLOAD state; 'succeeded': number of SUCCESSFULLYBUILT builds. 'superseded': number of SUPERSEDED builds. param include_needsbuild: Indicates whether to include builds with the status NEEDSBUILD in the pending and total counts. This is useful in situations where a build that hasn't started isn't considered a build by the user. type include_needsbuild: bool return: a dictionary with the 4 keys specified above. rtype: dict ."
      operationId: archive-getBuildCounters
      parameters:
        - *a4
        - *a5
