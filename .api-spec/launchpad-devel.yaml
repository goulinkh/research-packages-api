  /{distribution}/{series}?ws.op=getDifferencesTo:
    get:
      tags:
        - distro_series
      summary: Get differences to
      description: "Return the differences between this series and the specified parent_series (or all the parent series if parent_series is None). param parent_series: The parent series for which the differences should be returned. All parents are considered if this is None. param difference_type: The type of the differences to return. param source_package_name_filter: A package name to use as a filter for the differences. param status: The status of the differences to return. param child_version_higher: Only return differences for which the child's version is higher than the parent's version."
      operationId: distro_series-getDifferencesTo
      parameters:
        - *a54
        - *a55
        - name: parent_series
          in: query
          required: false
          description: The parent series to consider.
          schema:
            type: string
            format: uri
            x-lp-resource-type: distro_series
        - name: difference_type
          in: query
          required: false
          description: Only return differences of this type.
          schema:
            type: string
            enum:
              - Unique to derived series
              - Missing from derived series
              - Different versions
        - name: source_package_name_filter
          in: query
          required: false
          description: Only return differences for packages matching this name.
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Only return differences of this status.
          schema:
            type: string
            enum:
              - Needs attention
              - Blocklisted current version
              - Blocklisted always
              - Resolved
        - name: child_version_higher
          in: query
          required: false
          description: Only return differences for which the child's version is higher than the parent's.
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
