  /{project}?ws.op=issueAccessToken:
    post:
      tags:
        - project
      summary: Issue access token
      description: "Issue a personal access token for this target. Access tokens can be used to push to repositories over HTTPS. These may be used in webservice API requests for certain methods in the target's repositories. They are either non-expiring or with an expiry time given by date_expires. return: The secret for a new personal access token (Launchpad only records the hash of this secret and not the secret itself, so the caller must be careful to save this)."
      operationId: project-issueAccessToken
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                description:
                  type: string
                  description: A short description of the token.
                  example: description
                scopes:
                  type: string
                  description: A list of scopes to be granted by this token.
                  example: scopes
                date_expires:
                  type: string
                  description: When the token should expire.
              required:
                - description
                - scopes
      parameters:
        - *a97
      responses:
        "200":
          description: Successful response
