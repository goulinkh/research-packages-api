    post:
      tags:
        - livefs_build
      summary: Cancel upload
      description: Cancel a build in the UPLOADING state. When a build transitions to UPLOADING its BuildQueue record is destroyed, so the ordinary cancel() path cannot reach it. This admin-only endpoint transitions the build directly to CANCELLED. BuildUploadHandler.process() will take care of cleaning the build directory in incoming/ in case it exists. If the build is not in UPLOADING state this method is a no-op.
      operationId: livefs_build-cancelUpload
      parameters:
        - *a75
      responses:
        "200":
          description: Successful response
