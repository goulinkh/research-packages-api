      operationId: project-newWebhook
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                delivery_url:
                  type: string
                  description: Delivery URL
                  example: delivery_url
                active:
                  type: string
                  description: Active Deliver details of subscribed events.
                event_types:
                  type: string
                  description: Event types
                  example: event_types
                secret:
                  type: string
                  description: Secret An optional string used to sign delivery bodies with HMAC-SHA1 in the X-Hub-Signature header. This must be less than 200 bytes long.
              required:
                - delivery_url
                - event_types
      parameters:
        - *a97
      responses:
        "200":
          description: Successful response
