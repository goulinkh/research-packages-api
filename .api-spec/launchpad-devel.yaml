  /{distribution}/{series}?ws.op=getPackageUploads:
    get:
      tags:
        - distro_series
      summary: Get package uploads
      description: 'Get package upload records for this distribution series. param status: Filter results by this PackageUploadStatus, or list of statuses. param created_since_date: If specified, only returns items uploaded since the timestamp supplied. param archive: Filter results for this IArchive. param pocket: Filter results by this PackagePublishingPocket or a list of PackagePublishingPocket. param custom_type: Filter results by this PackageUploadCustomFormat. param name: Filter results by this file name or package name. param version: Filter results by this version number string. param exact_match: If True, look for exact string matches on the name and version filters. If False, look for a substring match so that e.g. a package "kspreadsheetplusplus" would match the search string "spreadsheet". Defaults to False. return: A result set containing IPackageUpload.'
      operationId: distro_series-getPackageUploads
      parameters:
        - *a54
        - *a55
        - name: created_since_date
          in: query
          required: false
          description: Created Since Timestamp Return items that are more recent than this timestamp.
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Package Upload Status Return only items that have this status.
          schema:
            type: string
            enum:
              - New
              - Unapproved
              - Accepted
              - Done
              - Rejected
        - name: archive
          in: query
          required: false
          description: Archive Return only items for this archive.
          schema:
            type: string
            format: uri
            x-lp-resource-type: archive
        - name: pocket
          in: query
          required: false
          description: Pocket Return only items targeted to this pocket
          schema:
            type: string
            enum:
              - Release
              - Security
              - Updates
              - Proposed
              - Backports
        - name: custom_type
          in: query
          required: false
          description: Custom Type Return only items with custom files of this type.
          schema:
            type: string
            enum:
              - raw-installer
              - raw-translations
              - raw-dist-upgrader
              - raw-ddtp-tarball
              - raw-translations-static
              - meta-data
              - uefi
              - signing
        - name: name
          in: query
          required: false
          description: Package or file name
          schema:
            type: string
        - name: version
          in: query
          required: false
          description: Package version
          schema:
            type: string
        - name: exact_match
          in: query
          required: false
          description: Exact match Whether to filter name and version by exact matching.
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/package_upload-page"
