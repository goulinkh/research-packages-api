      description: "Search the person's questions. param search_text: A string that is matched against the question title and description. If None, the search_text is not included as a filter criteria. param status: A sequence of QuestionStatus Items. If None or an empty sequence, the status is not included as a filter criteria. The default is to match all status except Expired and Invalid. param language: An ILanguage or a sequence of ILanguage objects to match against the question's language. If None or an empty sequence, the language is not included as a filter criteria. param participation: A list of QuestionParticipation that defines the set of relationship to questions that will be searched. If None or an empty sequence, all relationships are considered. param needs_attention: If this flag is true, only questions that need attention the person will be included. These are the questions in the NEEDSINFO or ANSWERED state owned by the person. The questions not owned by the person but on which the person requested more information or gave an answer and that are back in the OPEN state are also included. param sort: An attribute of QuestionSort. If None, a default value is used. When there is a search_text value, the default is to sort by RELEVANCY, otherwise results are sorted NEWEST_FIRST. param created_since: Only return results whose datecreated property is greater than or equal to this date. param created_before: Only return results whose datecreated property is smaller than this date."
      operationId: person-searchQuestions
      parameters:
        - name: search_text
          in: query
          required: false
          description: Search text
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Status
          schema:
            type: string
        - name: language
          in: query
          required: false
          description: Language
          schema:
            type: string
        - name: participation
          in: query
          required: false
          description: Participation
          schema:
            type: string
            enum:
              - Owner
              - Subscriber
              - Assignee
              - Commenter
              - Answerer
        - name: needs_attention
          in: query
          required: false
          description: Needs attentions from
          schema:
            type: string
        - name: sort
          in: query
          required: false
          description: Sort
          schema:
            type: string
            enum:
              - by relevancy
              - by status
              - newest first
              - oldest first
              - recently updated first
        - name: created_before
          in: query
          required: false
          description: Search for questions that were created before the given date.
          schema:
            type: string
        - name: created_since
          in: query
          required: false
          description: Search for questions that were created since the given date.
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/question-page"
