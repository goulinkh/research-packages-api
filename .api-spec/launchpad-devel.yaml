  /bugs?ws.op=createBug:
    post:
      tags:
        - bugs
      summary: Create bug
      description: "Create a bug (with an appropriate bugtask) and return it. param target: The Project, Distribution or DistributionSourcePackage affected by this bug. param title: The title shown in bug listings. param description: The description of the issue. param information_type: Set the bug's information type to one different from the project's default. The type must conform to the project's bug sharing policy. (optional) param tags: A list of bug tags. (optional) param security_related: Is this bug's information type Private Security? (deprecated) param tags: Is this bug's information type Private user data. (deprecated) Things to note when using this factory: The reporter will be subscribed to the bug. Only people that the project shares with will see the bug when the bug's information type is Proprietary, Private, or Private Security."
      operationId: bugs-createBug
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Summary A one-line summary of the problem.
                  example: title
                description:
                  type: string
                  description: Description A detailed description of the problem, including the steps required to reproduce it.
                  example: description
                tags:
                  type: string
                  description: Tags Space-separated keywords for classifying this bug report.
                information_type:
                  type: string
                  enum:
                    - Public
                    - Public Security
                    - Private Security
                    - Private
                    - Proprietary
                    - Embargoed
                  description: Information Type The type of information contained in this bug report.
                security_related:
                  type: string
                  description: This bug is a security vulnerability.
                private:
                  type: string
                  description: This bug report should be private Private bug reports are visible only to their subscribers.
                target:
                  type: string
                  format: uri
                  x-lp-resource-type: bug_target
                  description: The project, distribution or source package that has this bug.
                  example: launchpad
              required:
                - title
                - description
                - target
      responses:
        "200":
          description: Successful response
