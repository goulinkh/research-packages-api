          type: string
          format: uri
          x-lp-resource-type: person
          description: Starter The person who finally set the state of the spec to the values that we consider mark it as complete.
        date_completed:
          type: string
          description: Date Completed The date when this spec was marked complete. Note that complete also includes "obsolete" and superseded. Essentially, it is the state where no more work will be done on the feature.
        date_created:
          type: string
          description: Date Created
        date_started:
          type: string
          description: Date Started The date when this spec was marked started.
        definition_status:
          type: string
          enum:
            - Approved
            - Pending Approval
            - Review
            - Drafting
            - Discussion
            - New
            - Superseded
            - Obsolete
          description: Definition Status The current status of the process to define the feature and get approval for the implementation plan.
        dependencies_collection_link:
          type: string
          format: uri
          x-lp-resource-type: specification-page-resource
          description: Specs on which this one depends.
        direction_approved:
          type: string
          description: Basic direction approved? Check this to indicate that the drafter and assignee have satisfied the approver that they are headed in the right basic direction with this specification.
        drafter_link:
          type: string
          format: uri
          x-lp-resource-type: person
          description: Drafter The person responsible for drafting the specification.
        has_accepted_goal:
          type: string
          description: Series goal is accepted Is true if this specification has been proposed as a goal for a specific series, and the drivers of that series have accepted the goal.
        implementation_status:
          type: string
          enum:
            - Unknown
            - Not started
            - Deferred
            - Needs Infrastructure
            - Blocked
            - Started
            - Slow progress
            - Good progress
            - Beta Available
            - Needs Code Review
            - Deployment
            - Implemented
            - Informational
          description: Implementation Status The state of progress being made on the actual implementation or delivery of this feature.
        information_type:
          type: string
          enum:
            - Public
            - Public Security
            - Private Security
            - Private
            - Proprietary
            - Embargoed
          description: Information Type The type of information contained in this specification.
        is_complete:
          type: string
          description: Is started Is True if this spec is already completely implemented. Note that it is True for informational specs, since they describe general functionality rather than specific code to be written. It is also true of obsolete and superseded specs, since there is no longer any need to schedule work for them.
        is_started:
          type: string
          description: Is started Is True if the spec is in a state which we consider to be "started". This looks at the delivery attribute, and also considers informational specs to be started when they are approved.
        lifecycle_status:
          type: string
          enum:
            - Not started
            - Started
            - Complete
          description: Lifecycle Status
        linked_branches_collection_link:
          type: string
          format: uri
          x-lp-resource-type: specification_branch-page-resource
          description: Branches associated with this spec, usually branches on which this spec is being implemented.
        milestone_link:
          type: string
          format: uri
          x-lp-resource-type: milestone
          description: Milestone The milestone in which we would like this feature to be delivered.
        name:
          type: string
          description: "Name May contain lower-case letters, numbers, and dashes. It will be used in the specification url. Examples: mozilla-type-ahead-find, postgres-smart-serial."
        owner_link:
          type: string
          format: uri
          x-lp-resource-type: person
          description: Owner
        priority:
          type: string
          enum:
            - Not
            - Undefined
            - Low
            - Medium
            - High
            - Essential
          description: Priority
        specification_url:
          type: string
          description: Specification URL The URL of the specification. This is usually a wiki page.
        starter_link:
          type: string
          format: uri
          x-lp-resource-type: person
          description: Starter The person who first set the state of the spec to the values that we consider mark it as started.
        summary:
          type: string
          description: Summary A single-paragraph description of the feature. This will also be displayed in most feature listings.
        target_link:
          type: string
          format: uri
          x-lp-resource-type: specification_target
          description: For The project for which this proposal is being made.
        title:
          type: string
          description: Title Describe the feature as clearly as possible in up to 70 characters. This title is displayed in every feature list or report.
        whiteboard:
          type: string
          description: Status Whiteboard Any notes on the status of this spec you would like to make. Your changes will override the current text.
        workitems_text:
          type: string
          description: Work Items Work items for this specification input in a text format. Your changes will override the current work items.
      required:
        - approver_link
        - assignee_link
        - bugs_collection_link
        - completer_link
        - date_completed
        - date_created
        - date_started
        - definition_status
        - dependencies_collection_link
        - direction_approved
        - drafter_link
        - has_accepted_goal
        - implementation_status
        - information_type
        - is_complete
        - is_started
        - lifecycle_status
        - linked_branches_collection_link
        - milestone_link
        - name
        - owner_link
        - priority
        - specification_url
        - starter_link
        - summary
        - target_link
        - title
        - whiteboard
        - workitems_text
