paths:
  /:
    get:
      tags:
        - service-root
      summary: The root of the web service.
      operationId: service-root-get
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service-root-json"
  /archives?ws.op=getByReference:
    get:
      tags:
        - archives
      summary: Get by reference
      description: Return the IArchive with the given archive reference.
      operationId: archives-getByReference
      parameters:
        - name: reference
          in: query
          required: true
          description: Archive reference string
          schema:
            type: string
          example: reference
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/archive-full"
  /archives:
    get:
      tags:
        - archives
      summary: List archives
      description: Interface for ArchiveSet
      operationId: archives-get
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/archive-page"
  /branches?ws.op=getByUniqueName:
    get:
      tags:
        - branches
      summary: Get by unique name
      description: Find a branch by its ~owner/product/name unique name. Return None if no match was found.
      operationId: branches-getByUniqueName
      parameters:
        - name: unique_name
          in: query
          required: true
          description: Branch unique name
          schema:
            type: string
          example: ~launchpad/launchpad/master
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/branch-full"
  /branches?ws.op=getByUrl:
    get:
      tags:
        - branches
      summary: Get by url
      description: "Find a branch by URL. Either from the external specified in Branch.url, from the URL on http://bazaar.launchpad.net/ or the lp: URL. This is a frontend shim to IBranchLookup.getByUrl to allow it to be exported over the API. If you want to call this from within the Launchpad app, use the IBranchLookup version instead. Return None if no match was found."
      operationId: branches-getByUrl
      parameters:
        - name: url
          in: query
          required: true
          description: Branch URL
          schema:
            type: string
          example: https://git.launchpad.net/launchpad
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/branch-full"
  /branches?ws.op=getByUrls:
    get:
      tags:
        - branches
      summary: Get by urls
      description: "Finds branches by URL. Either from the external specified in Branch.url, from the URL on http://bazaar.launchpad.net/ , or from the lp: URL. This is a frontend shim to IBranchLookup.getByUrls to allow it to be exported over the API. If you want to call this from within the Launchpad app, use the IBranchLookup version instead. param urls: An iterable of URLs expressed as strings. return: A dictionary mapping URLs to branches. If the URL has no associated branch, the URL will map to None."
      operationId: branches-getByUrls
      parameters:
        - name: urls
          in: query
          required: true
          description: "A list of URLs of branches These can be URLs external to Launchpad, lp: URLs, or http://bazaar.launchpad.net/ URLs, or any mix of all these different kinds."
          schema:
            type: string
          example: urls
      responses:
        "200":
          description: Successful response
  /branches?ws.op=getByPath:
    get:
      tags:
        - branches
      summary: Get by path
      description: "Find a branch by its path. The path is the same as its lp: URL, but without the leading lp:, so it may be in any of these forms: Unique names: ~OWNER/PROJECT/NAME ~OWNER/DISTRO/SERIES/SOURCE/NAME ~OWNER/+junk/NAME Aliases linked to other objects: PROJECT PROJECT/SERIES DISTRO/SOURCE DISTRO/SUITE/SOURCE Return None if no match was found."
      operationId: branches-getByPath
      parameters:
        - name: path
          in: query
          required: true
          description: Branch path
          schema:
            type: string
          example: path
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/branch-full"
  /branches?ws.op=getBranches:
    get:
      tags:
        - branches
      summary: Get branches
      description: "Return a collection of branches. param user: An IPerson. Only branches visible by this user will be returned. param order_by: An item from the BranchListingSort enumeration, or None to return an unordered result set. param modified_since_date: If not None, return only branches whose date_last_modified is greater than this date. param eager_load: If True (the default because this is used in the web service and it needs the related objects to create links) eager load related objects (products, code imports etc)."
      operationId: branches-getBranches
      parameters:
        - name: order_by
          in: query
          required: false
          description: Sort order
          schema:
            type: string
            enum:
              - by most interesting
              - by project name
              - by status
              - by branch name
              - by owner name
              - most recently changed first
              - most neglected first
              - newest first
              - oldest first
        - name: modified_since_date
          in: query
          required: false
          description: Modified since date Return only branches whose date_last_modified is greater than or equal to this date.
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/branch-page"
  /branches?ws.op=getBranchVisibilityInfo:
    get:
      tags:
        - branches
      summary: Get branch visibility info
      description: "Return the named branches visible to both user and person. Anonymous requesters don't get any information. param user: The user requesting the information. If the user is None then we return an empty dict. param person: The person whose branch visibility we wish to check. param branch_names: The unique names of the branches to check. Return a dict with the following values: person_name: the displayname of the person. visible_branches: a list of the unique names of the branches which the requester and specified person can both see. This API call is provided for use by the client Javascript. It is not designed to efficiently scale to handle requests for large numbers of branches."
      operationId: branches-getBranchVisibilityInfo
      parameters:
        - name: person
          in: query
          required: true
          description: The person whose branch visibility is being checked.
          schema:
            type: string
            format: uri
            x-lp-resource-type: person
          example: ~launchpad
        - name: branch_names
          in: query
          required: true
          description: List of branch unique names
          schema:
            type: string
          example: branch_names
      responses:
        "200":
          description: Successful response
  /branches?ws.op=getMergeProposals:
    get:
      tags:
        - branches
      summary: Get merge proposals
      description: "Return the merge proposals that resulted in this revision. param merged_revision: The revision_id of the revision that resulted from this merge proposal. param visible_by_user: The user to whom the proposals must be visible. If None, only public proposals will be returned."
      operationId: branches-getMergeProposals
      parameters:
        - name: merged_revision
          in: query
          required: true
          schema:
            type: string
          example: merged_revision
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/branch_merge_proposal-page"
  /branches:
    get:
      tags:
        - branches
      summary: List branches
      description: Interface representing the set of branches.
      operationId: branches-get
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/branch-page"
  /bugs/bugtrackers?ws.op=getByName:
    get:
      tags:
        - bug_trackers
      summary: Get by name
      description: Get a BugTracker by its name. If no tracker with the given name exists, return default.
      operationId: bug_trackers-getByName
      parameters:
        - name: name
          in: query
          required: true
          description: The bug tracker name
          schema:
            type: string
          example: ubuntu
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bug_tracker-full"
  /bugs/bugtrackers?ws.op=queryByBaseURL:
    get:
      tags:
        - bug_trackers
      summary: Query by base url
      description: Return one or None BugTracker's by baseurl
      operationId: bug_trackers-queryByBaseURL
      parameters:
        - name: base_url
          in: query
          required: true
          description: The base URL of the bug tracker
          schema:
            type: string
          example: https://bugzilla.example.com/
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bug_tracker-full"
  /bugs/bugtrackers?ws.op=ensureBugTracker:
    post:
      tags:
        - bug_trackers
      summary: Ensure bug tracker
      description: Make sure that there is a bugtracker for the given base url. If not, create one using the given attributes.
      operationId: bug_trackers-ensureBugTracker
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                base_url:
                  type: string
                  description: Location The top-level URL for the bug tracker, or an upstream email address. This must be accurate so that Launchpad can link to external bug reports.
                  example: https://bugzilla.example.com/
                bug_tracker_type:
                  type: string
                  enum:
                    - Bugzilla
                    - Debbugs
                    - Roundup
                    - Trac
                    - SourceForge or SourceForge derivative
                    - Mantis
                    - Request Tracker (RT)
                    - Email Address
                    - Savane
                    - PHP Project Bugtracker
                    - Google Code
                    - GitHub Issues
                    - GitLab Issues
                  description: Bug Tracker Type
                title:
                  type: string
                  description: Title A descriptive label for this tracker to show in listings.
                summary:
                  type: string
                  description: Summary A brief introduction or overview of this bug tracker instance.
                contact_details:
                  type: string
                  description: Contact details The contact details for the external bug tracker (so that, for example, its administrators can be contacted about a security breach).
                name:
                  type: string
                  description: Name A URL-friendly name for the bug tracker, such as "mozilla-bugs".
              required:
                - base_url
      responses:
        "200":
          description: Successful response
  /bugs/bugtrackers:
    get:
      tags:
        - bug_trackers
      summary: List bug trackers
      description: A set of IBugTracker's. Each BugTracker is a distinct instance of a bug tracking tool. For example, bugzilla.mozilla.org is distinct from bugzilla.gnome.org.
      operationId: bug_trackers-get
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bug_tracker-page"
  /builders?ws.op=getByName:
    get:
      tags:
        - builders
      summary: Get by name
      description: Retrieve a builder by name
      operationId: builders-getByName
      parameters:
        - name: name
          in: query
          required: true
          description: Builder name
          schema:
            type: string
          example: ubuntu
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/builder-full"
  /builders?ws.op=getBuildQueueSizes:
    get:
      tags:
        - builders
      summary: Get build queue sizes
      description: "Return the number of pending builds for each processor. return: a dict of tuples with the queue size and duration for each processor and virtualisation. For example: { 'virt': { '386': (1, datetime.timedelta(0, 60)), 'amd64': (2, datetime.timedelta(0, 30)), }, 'nonvirt':... } The tuple contains the size of the queue, as an integer, and the sum of the jobs 'estimated_duration' in queue, as a timedelta or None for empty queues."
      operationId: builders-getBuildQueueSizes
      responses:
        "200":
          description: Successful response
  /builders?ws.op=getBuildersForQueue:
    get:
      tags:
        - builders
      summary: Get builders for queue
      description: Return all builders with the given properties.
      operationId: builders-getBuildersForQueue
      parameters:
        - name: processor
          in: query
          required: true
          description: Processor
          schema:
            type: string
            format: uri
            x-lp-resource-type: processor
          example: processor
        - name: virtualized
          in: query
          required: false
          description: Virtualized
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/builder-page"
  /builders?ws.op=new:
    post:
      tags:
        - builders
      summary: New
      description: Create a new builder. The builder will be set to manual. An admin needs to verify its configuration and set it to automatic before jobs will be dispatched.
      operationId: builders-new
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                processors:
                  type: string
                  description: Processors Processors identifying jobs which can be built by this device.
                  example: processors
                url:
                  type: string
                  description: "URL The URL to the build machine, used as a unique identifier. Includes protocol, host and port only, e.g.: http://farm.com:8221/"
                  example: https://git.launchpad.net/launchpad
                name:
                  type: string
                  description: Name The builder name used for reference purposes
                  example: ubuntu
                title:
                  type: string
                  description: Title The builder title. Should be just a few words.
                  example: title
                active:
                  type: string
                  description: Publicly Visible Whether or not to present the builder publicly.
                virtualized:
                  type: string
                  description: Virtualized Whether or not the builder is a virtual Xen instance.
                  example: virtualized
                vm_host:
                  type: string
                  description: "VM host The machine hostname hosting the virtual buildd-worker, e.g.: foobar-host.ppa"
                open_resources:
                  type: string
                  description: Open resources Resource tags offered by this builder, that can be required by a build and if required must match.
                restricted_resources:
                  type: string
                  description: Restricted resources Resource tags offered by this builder, indicating that the builder may only be used by builds that explicitly require these tags.
              required:
                - processors
                - url
                - name
                - title
                - virtualized
      responses:
        "200":
          description: Successful response
  /builders:
    get:
      tags:
        - builders
      summary: List builders
      description: "Collections of builders. IBuilderSet provides access to all Builders in the system, and also acts as a Factory to allow the creation of new Builders. Methods on this interface should deal with the set of Builders: methods that affect a single Builder should be on IBuilder."
      operationId: builders-get
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/builder-page"
  /+charm-bases?ws.op=getByDistroSeries:
    get:
      tags:
        - charm_bases
      summary: Get by distro series
      description: "Return the ICharmBase for this distro series. raises NoSuchCharmBase: if no base exists for this distro series."
      operationId: charm_bases-getByDistroSeries
      parameters:
        - name: distro_series
          in: query
          required: true
          description: Distro series
          schema:
            type: string
            format: uri
            x-lp-resource-type: distro_series
          example: noble
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/charm_base-full"
  /+charm-bases?ws.op=new:
    post:
      tags:
        - charm_bases
      summary: New
      description: Create an ICharmBase.
      operationId: charm_bases-new
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                distro_series:
                  type: string
                  format: uri
                  x-lp-resource-type: distro_series
                  description: Distro series
                  example: noble
                build_snap_channels:
                  type: string
                  description: Source snap channels for builds A dictionary mapping snap names to channels to use when building charm recipes that specify this base. The special '_byarch' key may have a mapping of architecture names to mappings of snap names to channels, which if present override the channels declared at the top level when building for those architectures.
                  example: build_snap_channels
                processors:
                  type: string
              required:
                - distro_series
                - build_snap_channels
      responses:
        "200":
          description: Successful response
  /+charm-bases:
    get:
      tags:
        - charm_bases
      summary: List charm bases
      description: Interface representing the set of bases for charms.
      operationId: charm_bases-get
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/charm_base-page"
  /+charm-recipes?ws.op=getByName:
    get:
      tags:
        - charm_recipes
      summary: Get by name
      description: Returns the appropriate ICharmRecipe for the given objects.
      operationId: charm_recipes-getByName
      parameters:
        - name: owner
          in: query
          required: true
          description: Owner
          schema:
            type: string
            format: uri
            x-lp-resource-type: person
          example: ~launchpad
        - name: project
          in: query
          required: true
          description: Project
          schema:
            type: string
            format: uri
            x-lp-resource-type: project
          example: launchpad
        - name: name
          in: query
          required: true
          description: Recipe name
          schema:
            type: string
          example: ubuntu
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/charm_recipe-full"
  /+charm-recipes?ws.op=findByOwner:
    get:
      tags:
        - charm_recipes
      summary: Find by owner
      description: Return all charm recipes with the given owner.
      operationId: charm_recipes-findByOwner
      parameters:
        - name: owner
          in: query
          required: true
          description: Owner
          schema:
            type: string
            format: uri
            x-lp-resource-type: person
          example: ~launchpad
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/charm_recipe-page"
  /+charm-recipes?ws.op=new:
    post:
      tags:
        - charm_recipes
      summary: New
      description: Create an ICharmRecipe.
      operationId: charm_recipes-new
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                owner:
                  type: string
                  format: uri
                  x-lp-resource-type: person
                  description: Owner The owner of this charm recipe.
                  example: ~launchpad
                project:
                  type: string
                  format: uri
                  x-lp-resource-type: project
                  description: The project that this charm recipe is associated with
                  example: launchpad
                name:
                  type: string
                  description: Charm recipe name The name of the charm recipe.
                  example: ubuntu
                description:
                  type: string
                  description: Description A description of the charm recipe.
                git_repository:
                  type: string
                  format: uri
                  x-lp-resource-type: git_repository
                  description: Git repository A Git repository with a branch containing a charm recipe.
                git_repository_url:
                  type: string
                  description: Git repository URL The URL of a Git repository with a branch containing a charmcraft.yaml at the top level.
                git_path:
