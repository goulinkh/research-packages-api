    distro_series-diff:
      type: object
      properties:
        active:
          type: string
          description: Active Whether or not this series is stable and supported, or under current development. This excludes series which are experimental or obsolete.
        advertise_by_hash:
          type: string
          description: Advertise by-hash directories Advertise by-hash directories with a flag in the Release file so that apt uses them by default. Only effective if publish_by_hash is also set.
        allowed_hashes:
          type: string
          description: Allowed hash algorithms for publishing A list of hash algorithm names (e.g. ["sha256", "sha512"]) that will be included in published index files (Release, Packages, Sources) and by-hash directories. If not set, all supported hashes are used.
        backports_not_automatic:
          type: string
          description: "Don't upgrade to backports automatically Set NotAutomatic: yes and ButAutomaticUpgrades: yes in Release files generated for the backports pocket. This tells apt to automatically upgrade within backports, but not into it."
        bug_reported_acknowledgement:
          type: string
          description: After reporting a bug, I can expect the following. This message of acknowledgement will be displayed to anyone after reporting a bug.
        bug_reporting_guidelines:
          type: string
          description: Helpful guidelines for reporting a bug These guidelines will be shown to everyone reporting a bug and should be text or a bulleted list with your particular requirements, if any.
        changeslist:
          type: string
          description: Email changes to The mailing list or other email address that Launchpad should notify about new uploads.
        content_templates:
          type: string
          description: Templates to use for reporting a bug This pre-defined template will be given to the users to guide them when reporting a bug.
        date_created:
          type: string
          description: The date this series was registered.
        datereleased:
          type: string
          description: Date released
        description:
          type: string
          description: Description A detailed description of this series, with information on the architectures covered, the availability of security updates and any other relevant information.
        displayname:
          type: string
          description: Display name The series displayname.
        distribution_link:
          type: string
          format: uri
          x-lp-resource-type: distribution
          description: Distribution The distribution for which this is a series.
        driver_link:
          type: string
          format: uri
          x-lp-resource-type: person
          description: Driver The person or team responsible for decisions about features and bugs that will be targeted to this series of the distribution.
        fullseriesname:
          type: string
          description: Series full name The series full name, e.g. Ubuntu Warty
        include_long_descriptions:
          type: string
          description: Include long descriptions in Packages rather than in Translation-en If True, write long descriptions to the per-architecture Packages files; if False, write them to a Translation-en file common across architectures instead. Using a common file reduces the bandwidth footprint of enabling multiarch on clients, which requires downloading Packages files for multiple architectures.
        index_compressors:
          type: string
          description: Compression types to use for published index files A list of compression types to use for published index files (Packages, Sources, etc.).
        language_pack_full_export_requested:
          type: string
          description: Request a full language pack export Whether next language pack generation will be a full export. This information is useful when update packs are too big and want to merge all those changes in the base pack.
        main_archive_link:
          type: string
          format: uri
          x-lp-resource-type: archive
          description: Distribution Main Archive
        name:
          type: string
          description: Name The name of this series.
        nominatedarchindep_link:
          type: string
          format: uri
          x-lp-resource-type: distro_arch_series
          description: DistroArchSeries designed to build architecture-independent packages within this distroseries context.
        proposed_not_automatic:
          type: string
          description: "Don't upgrade to proposed updates automatically Set NotAutomatic: yes and ButAutomaticUpgrades: yes in Release files generated for the proposed pocket. This tells apt to automatically upgrade within proposed, but not into it."
        publish_by_hash:
          type: string
          description: Publish by-hash directories Publish archive index files in by-hash directories so that apt can retrieve them based on their hash, avoiding race conditions between InRelease and other files during mirror updates.
        publish_i18n_index:
          type: string
          description: Publish I18n index Publish archive i18n/Index file, which is believed to be unused.
        registrant_link:
          type: string
          format: uri
          x-lp-resource-type: person
          description: Registrant
        status:
          type: string
          enum:
            - Experimental
            - Active Development
            - Pre-release Freeze
            - Current Stable Release
            - Supported
            - Obsolete
            - Future
          description: Status
        strict_supported_component_dependencies:
          type: string
          description: Strict dependencies of supported components If True, packages in supported components (main and restricted) may not build-depend on packages in unsupported components. Do not rely on the name of this attribute, even for reading; it is currently subject to change.
        summary:
          type: string
          description: 'Summary A single paragraph that explains the goals of of this series and the intended users. For example: "The 2.0 series of Apache represents the current stable series, and is recommended for all new deployments".'
        supported:
          type: string
          description: Supported Whether or not this series is currently supported.
        title:
          type: string
          description: Title The title of this series. It should be distinctive and designed to look good at the top of a page.
        translations_usage:
          type: string
          enum:
            - Unknown
            - Launchpad
            - External
            - Not Applicable
          description: Type of service for translations application Where does this pillar do translations?
        valid_until_config:
          type: string
          description: 'Valid-Until configuration Optional dict configuration to control publishing of Valid-Until tags in Release files for main archives. Each key must be one of: Release (can be specified only for unreleased series) Security Updates Proposed Backports Each value must be a dict with two integer fields (both >= 1): refresh_threshold: Refresh when Valid-Until is within this many days (must be <= validity_period) validity_period: How many days the Release file remains valid Example: { "SECURITY": { "refresh_threshold": 7, "validity_period": 14 }, "UPDATES": { "refresh_threshold": 5, "validity_period": 10 } } Note: Setting this attribute will overwrite the existing value entirely. To update the existing configuration, retrieve the current value first, update it, and then set the complete configuration.'
        version:
          type: string
          description: Version The version string for this series.
