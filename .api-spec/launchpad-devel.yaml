        - person
      summary: Retract team membership
      description: "Retract this team's membership in the given team. If there's a membership entry for this team on the given team and its status is either APPROVED, ADMIN, PENDING, or INVITED, the status is changed and the relevant entries in TeamParticipation. APPROVED and ADMIN status are changed to DEACTIVATED. PENDING status is changed to DECLINED. INVITED status is changes to INVITATION_DECLINED. param team: The team to leave. param user: The user making the retraction. param comment: An optional explanation about why the change was made."
