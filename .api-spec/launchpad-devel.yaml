  /questions?ws.op=searchQuestions:
    get:
      tags:
        - questions
      summary: Search questions
      description: "Return the questions from the collection matching search criteria. param search_text: A string that is matched against the question title and description. If None, the search_text is not included as a filter criteria. param status: A sequence of QuestionStatus Items. If None or an empty sequence, the status is not included as a filter criteria. param language: An ILanguage or a sequence of ILanguage objects to match against the question's language. If None or an empty sequence, the language is not included as a filter criteria. param sort: An attribute of QuestionSort. If None, a default value is used. When there is a search_text value, the default is to sort by RELEVANCY, otherwise results are sorted NEWEST_FIRST. param created_since: Only return results whose datecreated property is greater than or equal to this date. param created_before: Only return results whose datecreated property is smaller than this date."
      operationId: questions-searchQuestions
      parameters:
        - name: search_text
          in: query
          required: false
          description: Search text
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Status
          schema:
            type: string
        - name: language
          in: query
          required: false
          description: Language
          schema:
            type: string
        - name: sort
          in: query
          required: false
          description: Sort
          schema:
            type: string
            enum:
              - by relevancy
              - by status
              - newest first
              - oldest first
              - recently updated first
        - name: created_before
          in: query
          required: false
          description: Search for questions that were created before the given date.
          schema:
            type: string
        - name: created_since
          in: query
          required: false
          description: Search for questions that were created since the given date.
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/question-page"
