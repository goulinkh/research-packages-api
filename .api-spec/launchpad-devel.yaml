      parameters:
        - *a4
        - *a5
        - name: source_name
          in: query
          required: false
          description: Source package name
          schema:
            type: string
        - name: version
          in: query
          required: false
          description: Version
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Package Publishing Status The status of this publishing record
          schema:
            type: string
            enum:
              - Pending
              - Published
              - Superseded
              - Deleted
              - Obsolete
        - name: distro_series
          in: query
          required: false
          description: Distroseries name
          schema:
            type: string
            format: uri
            x-lp-resource-type: distro_series
