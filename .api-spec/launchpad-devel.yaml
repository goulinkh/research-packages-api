          in: query
          required: false
          schema:
            type: string
            format: uri
            x-lp-resource-type: person
        - name: bug_reporter
          in: query
          required: false
          schema:
            type: string
            format: uri
            x-lp-resource-type: person
        - name: bug_supervisor
          in: query
          required: false
          schema:
            type: string
            format: uri
            x-lp-resource-type: person
        - name: bug_commenter
          in: query
          required: false
          schema:
            type: string
            format: uri
            x-lp-resource-type: person
        - name: bug_subscriber
          in: query
          required: false
          schema:
            type: string
            format: uri
            x-lp-resource-type: person
        - name: structural_subscriber
          in: query
          required: false
          schema:
            type: string
            format: uri
            x-lp-resource-type: person
        - name: owner
          in: query
          required: false
          schema:
            type: string
            format: uri
            x-lp-resource-type: person
        - name: affected_user
          in: query
          required: false
          schema:
            type: string
            format: uri
            x-lp-resource-type: person
        - name: has_patch
          in: query
          required: false
          description: Show only bugs with patches available.
          schema:
            type: string
        - name: has_cve
          in: query
          required: false
          description: Show only bugs associated with a CVE
          schema:
            type: string
        - name: tags
          in: query
          required: false
          description: Tags String or list of strings for tags to search. To exclude, prepend a '-', e.g. '-unwantedtag'
          schema:
            type: string
        - name: tags_combinator
          in: query
          required: false
          description: Tags combination Search for any or all of the tags specified.
          schema:
            type: string
            enum:
              - Any
              - All
        - name: omit_duplicates
          in: query
          required: false
          description: Omit bugs marked as duplicate,
          schema:
            type: string
        - name: status_upstream
          in: query
          required: false
          description: "Status upstream Indicates the status of any remote watches associated with the bug. Possible values include: pending_bugwatch, hide_upstream, resolved_upstream, and open_upstream."
          schema:
            type: string
        - name: milestone
          in: query
          required: false
          description: Milestone Show only bug tasks targeted to this milestone.
          schema:
            type: string
        - name: component
          in: query
          required: false
          description: Component Distribution package archive grouping. E.g. main, universe, multiverse
          schema:
            type: string
        - name: nominated_for
          in: query
          required: false
          schema:
            type: string
            format: uri
            x-lp-resource-type: distro_series
        - name: has_no_package
          in: query
          required: false
          description: Exclude bugs with packages specified
