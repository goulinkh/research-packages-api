  /{distribution}/+archive/{archive}?ws.op=getBuildRecords:
    get:
      tags:
        - archive
      summary: Get build records
      description: "Return build records in the context it is implemented. It excludes build records generated by Gina (imported from a external repository), where IBuild.datebuilt is null and IBuild.buildstate is BuildStatus.FULLYBUILT. The result is simply not filtered if the optional filters are omitted by call sites. param build_state: optional BuildStatus value for filtering build records; param name: optional string for filtering build source package name. Sub-string matching is allowed via SQL LIKE. param pocket: optional PackagePublishingPocket value for filtering build records; param arch_tag: optional string for filtering build source packages by their architecture tag; param user: optional IPerson corresponding to the user performing the request. It will filter out build records for which the user have no 'view' permission. param binary_only: optional boolean indicating whether only BinaryPackageBuild objects should be returned, or more general PackageBuild objects (which may include, for example, SourcePackageRecipeBuild objects. return: a result set containing IPackageBuild records ordered by descending IPackageBuild.date_finished except when builds are filtered by BuildStatus.NEEDSBUILD, in this case records are ordered by descending BuildQueue.lastscore (dispatching order)."
      operationId: archive-getBuildRecords
      parameters:
        - *a4
        - *a5
        - name: source_name
          in: query
          required: false
          description: Source package name
          schema:
            type: string
        - name: build_state
          in: query
          required: false
          description: Build status The status of this build record
          schema:
            type: string
            enum:
              - Needs building
              - Successfully built
              - Failed to build
              - Dependency wait
              - Chroot problem
              - Build for superseded Source
              - Currently building
              - Failed to upload
              - Uploading build
              - Cancelling build
              - Cancelled build
              - Gathering build output
        - name: pocket
          in: query
          required: false
          description: Pocket The pocket into which this entry is published
          schema:
            type: string
            enum:
              - Release
              - Security
              - Updates
              - Proposed
              - Backports
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/build-page"
