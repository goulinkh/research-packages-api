  /{question_target}?ws.op=searchQuestions:
    get:
      tags:
        - question_target
      summary: Search questions
      description: "Return the questions from the collection matching search criteria. param search_text: A string that is matched against the question title and description. If None, the search_text is not included as a filter criteria. param status: A sequence of QuestionStatus Items. If None or an empty sequence, the status is not included as a filter criteria. The default is to match all status except Expired and Invalid. param language: An ILanguage or a sequence of ILanguage objects to match against the question's language. If None or an empty sequence, the language is not included as a filter criteria. param owner: The IPerson that created the question. param needs_attention_from: Selects questions that need attention from an IPerson. These are the questions in the NEEDSINFO or ANSWERED state owned by the person. The questions not owned by the person but on which the person requested more information or gave an answer and that are back in the OPEN state are also included. param sort: An attribute of QuestionSort. If None, a default value is used. When there is a search_text value, the default is to sort by RELEVANCY, otherwise results are sorted NEWEST_FIRST. param created_since: Only return results whose datecreated property is greater than or equal to this date. param created_before: Only return results whose datecreated property is smaller than this date."
      operationId: question_target-searchQuestions
      parameters:
        - &a107
          name: question_target
          in: path
          required: true
          description: URL segment of the question_target resource (Launchpad assigns this at runtime; replace with a real instance segment).
          schema:
            type: string
        - name: search_text
          in: query
          required: false
          description: Search text
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Status
          schema:
            type: string
        - name: language
          in: query
          required: false
          description: Language
          schema:
            type: string
        - name: owner
          in: query
          required: false
          description: Owner
          schema:
            type: string
            format: uri
            x-lp-resource-type: person
        - name: needs_attention_from
          in: query
          required: false
          description: Needs attentions from
          schema:
            type: string
            format: uri
            x-lp-resource-type: person
        - name: sort
          in: query
          required: false
          description: Sort
          schema:
            type: string
            enum:
              - by relevancy
              - by status
              - newest first
              - oldest first
              - recently updated first
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/question-page"
