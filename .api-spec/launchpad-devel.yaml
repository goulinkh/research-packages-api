  /{team}?ws.op=join:
    post:
      tags:
        - team
      summary: Join
      description: "Join the given team if its membership_policy is not RESTRICTED. Join the given team according to the policies and defaults of that team: If the team membership_policy is OPEN, the user is added as an APPROVED member with a NULL TeamMembership.reviewer. If the team membership_policy is MODERATED, the user is added as a PROPOSED member and one of the team's administrators have to approve the membership. If may_subscribe_to_list is True, then also attempt to subscribe to the team's mailing list, depending on the list status and the person's auto-subscribe settings. param requester: The person who requested the membership on behalf of a team or None when a person requests the membership for themselves. param may_subscribe_to_list: If True, also try subscribing to the team mailing list."
      operationId: team-join
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                team:
                  type: string
                  format: uri
                  x-lp-resource-type: person
                  description: Team
                  example: team
              required:
                - team
      parameters:
        - *a135
      responses:
        "200":
          description: Successful response
  /{team}?ws.op=leave:
    post:
      tags:
        - team
      summary: Leave
      description: "Leave the given team. This is a convenience method for retractTeamMembership() that allows a user to leave the given team, or to cancel a PENDING membership request. param team: The team to leave."
      operationId: team-leave
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                team:
                  type: string
                  format: uri
                  x-lp-resource-type: person
                  description: Team
                  example: team
              required:
                - team
      parameters:
        - *a135
      responses:
        "200":
          description: Successful response
  /{team}?ws.op=addMember:
    post:
      tags:
        - team
      summary: Add member
      description: "Add the given person as a member of this team. param person: If the given person is already a member of this team we'll simply change its membership status. Otherwise a new TeamMembership is created with the given status. param reviewer: The user who made the given person a member of this team. param comment: String that will be assigned to the proponent_comment, reviewer_comment, or acknowledger comment. param status: TeamMembershipStatus value must be either Approved, Proposed or Admin. If the new member is a team, the status will be changed to Invited unless the user is also an admin of that team. param force_team_add: If the person is actually a team and force_team_add is False, the team will actually be invited to join this one. Otherwise the team is added as if it were a person. param may_subscribe_to_list: If the person is not a team, and may_subscribe_to_list is True, then the person may be subscribed to the team's mailing list, depending on the list status and the person's auto-subscribe settings. return: A tuple containing a boolean indicating when the membership status changed and the current TeamMembershipStatus. This depends on the desired status passed as an argument, the membership policy and the user's privileges."
      operationId: team-addMember
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                person:
                  type: string
                  format: uri
                  x-lp-resource-type: person
                  description: Member
                  example: ~launchpad
                status:
                  type: string
                  enum:
                    - Proposed
                    - Approved
                    - Administrator
                    - Deactivated
                    - Expired
                    - Declined
                    - Invited
                    - Invitation declined
                  description: The state of this membership
                comment:
                  type: string
              required:
                - person
      parameters:
        - *a135
      responses:
        "200":
          description: Successful response
  /{team}?ws.op=acceptInvitationToBeMemberOf:
