      description: "Create a new package set. param name: the name of the package set to be created. param description: the description for the package set to be created. param owner: the owner of the package set to be created. param distroseries: the distroseries to which the new packageset is related. param related_set: the newly created package set is to be related to related_set (by being placed in the same package group). raises DuplicatePackagesetName: if a package set with the same name exists in distroseries already. return: a newly created IPackageset."
