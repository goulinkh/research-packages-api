        - name: modified_since
          in: query
          required: false
          description: Search for bugs that have been modified since the given date.
          schema:
            type: string
        - name: created_since
          in: query
          required: false
          description: Search for bugs that have been created since the given date.
          schema:
            type: string
        - name: created_before
          in: query
          required: false
          description: Search for bugs that were created before the given date.
          schema:
            type: string
        - name: omit_targeted
          in: query
          required: false
          description: Omit bugs targeted to a series
          schema:
            type: string
        - name: linked_blueprints
          in: query
          required: false
          description: Search for bugs that are linked to blueprints or for bugs that are not linked to blueprints.
          schema:
            type: string
            enum:
              - Show all bugs
              - Show only Bugs with linked Blueprints
              - Show only Bugs without linked Blueprints
