                distro_arch_series:
                  type: string
                  format: uri
                  x-lp-resource-type: distro_arch_series
                  example: amd64
                pocket:
                  type: string
                  enum:
                    - Release
                    - Security
                    - Updates
                    - Proposed
                    - Backports
                  example: Release
                unique_key:
                  type: string
                  description: A unique key for this build, if required.
                metadata_override:
                  type: string
                  description: A dict of data about the image.
                version:
                  type: string
                  description: A version string for this build.
              required:
