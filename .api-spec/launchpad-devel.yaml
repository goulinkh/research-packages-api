    post:
      tags:
        - distribution
      summary: New vulnerability
      description: Create a new vulnerability in the distribution.
      operationId: distribution-newVulnerability
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                    - Needs triage
                    - Active
                    - Ignored
                    - Retired
                  description: The status of the vulnerability.
                  example: Needs triage
                creator:
                  type: string
                  format: uri
                  x-lp-resource-type: person
                  description: Person creating the vulnerability.
                  example: creator
                information_type:
                  type: string
                  enum:
                    - Public
                    - Public Security
                    - Private Security
                    - Private
                    - Proprietary
                    - Embargoed
                  description: Information Type. Defaults to Public.
                  example: Public
                importance:
                  type: string
                  enum:
                    - Unknown
                    - Undecided
                    - Critical
                    - High
                    - Medium
                    - Low
                    - Wishlist
                  description: Indicates the work priority, not the severity. Defaults to Undecided.
                cve:
                  type: string
                  format: uri
                  x-lp-resource-type: cve
                  description: External CVE reference corresponding to this vulnerability, if any.
                description:
                  type: string
                  description: A short description of the vulnerability.
                notes:
                  type: string
                  description: Free-form notes for this vulnerability.
                mitigation:
                  type: string
                  description: Explains why we're ignoring this vulnerability.
                importance_explanation:
                  type: string
                  description: Used to explain why our importance differs from somebody else's CVSS score.
                date_made_public:
                  type: string
                  description: The date this vulnerability was made public.
              required:
                - status
                - creator
                - information_type
      parameters:
        - *a44
      responses:
        "200":
          description: Successful response
