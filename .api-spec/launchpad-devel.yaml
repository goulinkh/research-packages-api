openapi: 3.0.3
info:
  title: Launchpad Web Service API
  version: devel
  description: |-
    The Launchpad web service allows automated clients to access most of the functionality available on the Launchpad web site. For help getting started, see the help wiki.

    **About version devel**

    This version of the web service reflects the most recent changes made. It may abruptly change without warning. Periodically, these changes are bundled up and given a permanent version number.

    Generated from the Launchpad WADL description. Launchpad exposes a hypermedia web service: resource URLs are discovered at runtime from the service root and from links in other resources. Top-level collections use their real service-root URLs; other resource types are shown at a real example instance URL (e.g. `/ubuntu/+archive/primary`) so requests resolve as sent. Named operations are invoked with a `ws.op` argument on the resource URL, and each is exposed here as its own endpoint keyed by that value (e.g. `/people?ws.op=find`) so it carries its own parameters and response schema. Parameter examples are placeholders.
servers:
  - url: https://api.launchpad.net/devel
