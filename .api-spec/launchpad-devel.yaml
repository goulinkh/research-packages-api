  /{distribution}/+archive/{archive}?ws.op=syncSources:
    post:
      tags:
        - archive
      summary: Sync sources
      description: "Synchronise (copy) named sources into this archive from another. DEPRECATED: syncSource and syncSources are deprecated, and will be removed entirely in the future. Use the asynchronous copyPackage method instead, and poll getPublishedSources if you need to await completion. It will copy the most recent PUBLISHED versions of the named sources to the destination archive if necessary. This operation will only succeeds when all requested packages are synchronised between the archives. If any of the requested copies cannot be performed, the whole operation will fail. There will be no partial changes of the destination archive. If the source or target distribution has a development series alias, then it may be used as the source or target distroseries name respectively; but note that this will always be resolved to the true development series of that distribution, which may not match the alias in the respective published archives. param source_names: a list of string names of packages to copy. param from_archive: the source archive from which to copy. param to_pocket: the target pocket (as a string). param to_series: the target distroseries (as a string). param from_series: the source distroseries (as a string). param include_binaries: optional boolean, controls whether or not the published binaries for each given source should also be copied along with the source. param person: the IPerson who requests the sync. raises NoSuchSourcePackageName: if the source name is invalid raises PocketNotFound: if the pocket name is invalid raises NoSuchDistroSeries: if the distro series name is invalid raises CannotCopy: if there is a problem copying."
      operationId: archive-syncSources
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                source_names:
                  type: string
                  description: Source package names
                  example: source_names
                from_archive:
                  type: string
                  format: uri
                  x-lp-resource-type: archive
                  example: from_archive
                to_pocket:
                  type: string
                  description: Pocket name
                  example: to_pocket
                to_series:
                  type: string
                  description: Distroseries name The distro series to copy packages into.
                from_series:
                  type: string
                  description: Distroseries name The distro series to copy packages from.
                include_binaries:
                  type: string
                  description: Include Binaries Whether or not to copy binaries already built for this source
              required:
                - source_names
                - from_archive
                - to_pocket
      parameters:
        - *a4
        - *a5
      responses:
        "200":
          description: Successful response
  /{distribution}/+archive/{archive}?ws.op=syncSource:
    post:
      tags:
        - archive
      summary: Sync source
      description: "Synchronise (copy) a single named source into this archive. DEPRECATED: syncSource and syncSources are deprecated, and will be removed entirely in the future. Use the asynchronous copyPackage method instead, and poll getPublishedSources if you need to await completion. Copy a specific version of a named source to the destination archive if necessary. If the source distribution has a development series alias, then it may be used as the source distroseries name; but note that this will always be resolved to the true development series of that distribution, which may not match the alias in the published source archive. param source_name: a string name of the package to copy. param version: the version of the package to copy. param from_archive: the source archive from which to copy. param to_pocket: the target pocket (as a string). param to_series: the target distroseries (as a string). param include_binaries: optional boolean, controls whether or not the published binaries for each given source should also be copied along with the source. param person: the IPerson who requests the sync. raises NoSuchSourcePackageName: if the source name is invalid raises PocketNotFound: if the pocket name is invalid raises NoSuchDistroSeries: if the distro series name is invalid raises CannotCopy: if there is a problem copying."
      operationId: archive-syncSource
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                source_name:
                  type: string
                  description: Source package name
                  example: bash
                version:
                  type: string
                  description: Version
                  example: version
                from_archive:
                  type: string
                  format: uri
                  x-lp-resource-type: archive
                  example: from_archive
                to_pocket:
                  type: string
                  description: Pocket name
                  example: to_pocket
                to_series:
                  type: string
                  description: Distroseries name
                include_binaries:
                  type: string
                  description: Include Binaries Whether or not to copy binaries already built for this source
              required:
                - source_name
                - version
                - from_archive
                - to_pocket
      parameters:
        - *a4
        - *a5
      responses:
        "200":
          description: Successful response
  /{distribution}/+archive/{archive}?ws.op=newSubscription:
    post:
      tags:
        - archive
      summary: New subscription
      description: "Create a new subscription to this archive. Create an ArchiveSubscriber record which allows an IPerson to access a private repository. param subscriber: An IPerson who is allowed to access the repository for this archive. param registrant: An IPerson who created this subscription. param date_expires: When the subscription should expire; None if it should not expire (default). param description: An option textual description of the subscription being created. return: The IArchiveSubscriber that was created."
