  /+snaps?ws.op=new:
    post:
      tags:
        - snaps
      summary: New
      description: Create an ISnap.
      operationId: snaps-new
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                owner:
                  type: string
                  format: uri
                  x-lp-resource-type: person
                  description: Owner The owner of this snap package.
                  example: ~launchpad
                distro_series:
                  type: string
                  format: uri
                  x-lp-resource-type: distro_series
                  description: Distro Series The series for which the snap package should be built. If not set, Launchpad will infer an appropriate series from snapcraft.yaml.
                name:
                  type: string
                  description: Snap recipe name The name of the snap build recipe.
                  example: ubuntu
                description:
                  type: string
                  description: Description A description of the snap package.
                branch:
                  type: string
                  format: uri
                  x-lp-resource-type: branch
                  description: Bazaar branch A Bazaar branch containing a snap/snapcraft.yaml, build-aux/snap/snapcraft.yaml, snapcraft.yaml, or .snapcraft.yaml recipe at the top level.
                git_repository:
                  type: string
                  format: uri
                  x-lp-resource-type: git_repository
                  description: Git repository A Git repository with a branch containing a snap/snapcraft.yaml, build-aux/snap/snapcraft.yaml, snapcraft.yaml, or .snapcraft.yaml recipe at the top level.
                git_repository_url:
                  type: string
                  description: Git repository URL The URL of a Git repository with a branch containing a snap/snapcraft.yaml, build-aux/snap/snapcraft.yaml, snapcraft.yaml, or .snapcraft.yaml recipe at the top level.
                git_path:
                  type: string
                  description: Git branch path The path of the Git branch containing a snap/snapcraft.yaml, build-aux/snap/snapcraft.yaml, snapcraft.yaml, or .snapcraft.yaml recipe at the top level.
                git_ref:
                  type: string
                  format: uri
                  x-lp-resource-type: git_ref
                  description: Git branch The Git branch containing a snap/snapcraft.yaml, build-aux/snap/snapcraft.yaml, snapcraft.yaml, or .snapcraft.yaml recipe at the top level.
                build_path:
                  type: string
                  description: Build path Subdirectory within the branch containing snapcraft.yaml.
                auto_build:
                  type: string
                  description: Automatically build when branch changes Whether this snap package is built automatically when the branch containing its snap/snapcraft.yaml, build-aux/snap/snapcraft.yaml, snapcraft.yaml, or .snapcraft.yaml recipe changes.
                auto_build_archive:
                  type: string
                  format: uri
                  x-lp-resource-type: archive
                  description: Source archive for automatic builds The archive from which automatic builds of this snap package should be built.
                auto_build_pocket:
                  type: string
                  enum:
                    - Release
                    - Security
                    - Updates
                    - Proposed
                    - Backports
                  description: Pocket for automatic builds The package stream within the source archive and distribution series to use when building the snap package. If the source archive is a PPA, then the PPA's archive dependencies will be used to select the pocket in the distribution's primary archive.
                store_upload:
                  type: string
                  description: Automatically upload to store Whether builds of this snap package are automatically uploaded to the store.
                store_series:
                  type: string
                  format: uri
                  x-lp-resource-type: snappy_series
                  description: Store series The series in which this snap package should be published in the store.
                store_name:
                  type: string
                  description: Registered store package name The registered name of this snap package in the store.
                store_channels:
                  type: string
                  description: Store channels Channels to release this snap package to after uploading it to the store. A channel is defined by a combination of an optional track, a risk, and an optional branch, e.g. '2.1/stable/fix-123', '2.1/stable', 'stable/fix-123', or 'stable'.
                project:
                  type: string
                  format: uri
                  x-lp-resource-type: project
                  description: The project that this Snap is associated with
                use_fetch_service:
                  type: string
                  description: Use fetch service If set, Snap builds will use the fetch-service instead of the builder-proxy to access external resources.
                fetch_service_policy:
                  type: string
                  enum:
                    - strict
                    - permissive
                  description: Fetch service policy Which policy to use when using the fetch service. The “strict” mode only allows certain resources and formats, and errors out in any case the restrictions are violated. The “permissive” mode works similarly, but only logs a warning when encountering any violations.
                information_type:
                  type: string
                  enum:
                    - Public
                    - Public Security
                    - Private Security
                    - Private
                    - Proprietary
                    - Embargoed
                  description: Information type The type of information contained in this Snap recipe.
                processors:
                  type: string
              required:
                - owner
                - name
      responses:
        "200":
          description: Successful response
