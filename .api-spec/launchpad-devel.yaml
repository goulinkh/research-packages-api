  /+rock-recipes?ws.op=new:
    post:
      tags:
        - rock_recipes
      summary: New
      description: Create an IRockRecipe.
      operationId: rock_recipes-new
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                owner:
                  type: string
                  format: uri
                  x-lp-resource-type: person
                  description: Owner The owner of this rock recipe.
                  example: ~launchpad
                project:
                  type: string
                  format: uri
                  x-lp-resource-type: project
                  description: The project that this rock recipe is associated with
                  example: launchpad
                name:
                  type: string
                  description: Rock recipe name The name of the rock recipe.
                  example: ubuntu
                description:
                  type: string
                  description: Description A description of the rock recipe.
                git_repository:
                  type: string
                  format: uri
                  x-lp-resource-type: git_repository
                  description: Git repository A Git repository with a branch containing a rockcraft.yaml recipe.
                git_repository_url:
                  type: string
                  description: Git repository URL The URL of a Git repository with a branch containing a rockcraft.yaml at the top level.
                git_path:
                  type: string
                  description: Git branch path The path of the Git branch containing a rockcraft.yaml recipe.
                git_ref:
                  type: string
                  format: uri
                  x-lp-resource-type: git_ref
                  description: Git branch The Git branch containing a rockcraft.yaml recipe.
                build_path:
                  type: string
                  description: Build path Subdirectory within the branch containing rockcraft.yaml.
                auto_build:
                  type: string
                  description: Automatically build when branch changes Whether this rock recipe is built automatically when the branch containing its rockcraft.yaml recipe changes.
                auto_build_channels:
                  type: string
                  description: Source snap channels for automatic builds A dictionary mapping snap names to channels to use when building this rock recipe. Currently only 'core', 'core18', 'core20', and 'rockcraft' keys are supported.
                store_upload:
                  type: string
                  description: Automatically upload to store Whether builds of this rock recipe are automatically uploaded to the store.
                store_name:
                  type: string
                  description: Registered store name The registered name of this rock in the store.
                store_channels:
                  type: string
                  description: Store channels Channels to release this rock to after uploading it to the store. A channel is defined by a combination of an optional track, a risk, and an optional branch, e.g. '2.1/stable/fix-123', '2.1/stable', 'stable/fix-123', or 'stable'.
                use_fetch_service:
                  type: string
                  description: Use fetch service If set, Rock builds will use the fetch-service instead of the builder-proxy to access external resources.
                fetch_service_policy:
                  type: string
                  enum:
                    - strict
                    - permissive
                  description: Fetch service policy Which policy to use when using the fetch service. Ignored if use_fetch_service flag is False.
                information_type:
                  type: string
                  enum:
                    - Public
                    - Public Security
                    - Private Security
                    - Private
                    - Proprietary
                    - Embargoed
                  description: Information type The type of information contained in this rock recipe.
              required:
                - owner
                - project
                - name
      responses:
        "200":
          description: Successful response
