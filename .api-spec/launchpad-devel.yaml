  /{distribution}/+archive/{archive}?ws.op=copyPackage:
    post:
      tags:
        - archive
      summary: Copy package
      description: "Copy a single named source into this archive. Asynchronously copy a specific version of a named source to the destination archive if necessary. Calls to this method will return immediately if the copy passes basic security checks and the copy will happen sometime later with full checking. If the source or target distribution has a development series alias, then it may be used as the source or target distroseries name respectively; but note that this will always be resolved to the true development series of that distribution, which may not match the alias in the respective published archives. param source_name: a string name of the package to copy. param version: the version of the package to copy. param from_archive: the source archive from which to copy. param to_pocket: the target pocket (as a string). param to_series: the target distroseries (as a string). param include_binaries: optional boolean, controls whether or not the published binaries for each given source should also be copied along with the source. param person: the IPerson who requests the sync. param sponsored: the IPerson who is being sponsored. Specifying this will ensure that the person's email address is used as the \"From:\" on the announcement email and will also be recorded as the creator of the new source publication. param unembargo: if True, allow copying restricted files from a private archive to a public archive, and re-upload them to the public librarian when doing so. param auto_approve: if True and the IPerson requesting the sync has queue admin permissions on the target, accept the copy immediately rather than setting it to unapproved. param silent: Suppress any emails that the copy would generate. Only usable with queue admin permissions on the target. param from_pocket: the source pocket (as a string). If omitted, copy from any pocket with a matching version. param from_series: the source distroseries (as a string). If omitted, copy from any series with a matching version. param phased_update_percentage: the phased update percentage to apply to the copied publication. param move: if True, delete the source publication after copying it to the destination. raises NoSuchSourcePackageName: if the source name is invalid raises PocketNotFound: if the pocket name is invalid raises NoSuchDistroSeries: if the distro series name is invalid raises CannotCopy: if there is a problem copying."
      operationId: archive-copyPackage
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                source_name:
                  type: string
                  description: Source package name
                  example: bash
                version:
                  type: string
                  description: Version
                  example: version
                from_archive:
                  type: string
                  format: uri
                  x-lp-resource-type: archive
                  example: from_archive
                to_pocket:
                  type: string
                  description: Target pocket name
                  example: to_pocket
                to_series:
                  type: string
                  description: Target distroseries name
                include_binaries:
                  type: string
                  description: Include Binaries Whether or not to copy binaries already built for this source
                sponsored:
                  type: string
                  format: uri
                  x-lp-resource-type: person
                  description: Sponsored Person The person who is being sponsored for this copy.
                unembargo:
                  type: string
                  description: Unembargo restricted files
                auto_approve:
                  type: string
                  description: Automatic approval Automatically approve this copy (queue admins only).
                silent:
                  type: string
                  description: Silent Don't notify anyone about this copy. For use by queue admins only.
                from_pocket:
                  type: string
                  description: Source pocket name
                from_series:
                  type: string
                  description: Source distroseries name
                phased_update_percentage:
                  type: string
                  description: Phased update percentage The percentage of users for whom this package should be recommended, or None to publish the update for everyone.
                move:
                  type: string
                  description: Move If true, delete the source publication after copying it to the destination.
              required:
                - source_name
                - version
                - from_archive
                - to_pocket
      parameters:
        - *a4
        - *a5
      responses:
        "200":
          description: Successful response
  /{distribution}/+archive/{archive}?ws.op=copyPackages:
    post:
      tags:
        - archive
      summary: Copy packages
      description: "Copy multiple named sources into this archive from another. Asynchronously copy the most recent PUBLISHED versions of the named sources to the destination archive if necessary. Calls to this method will return immediately if the copy passes basic security checks and the copy will happen sometime later with full checking. Partial changes of the destination archive can happen because each source is copied in its own transaction. If the source or target distribution has a development series alias, then it may be used as the source or target distroseries name respectively; but note that this will always be resolved to the true development series of that distribution, which may not match the alias in the respective published archives. param source_names: a list of string names of packages to copy. param from_archive: the source archive from which to copy. param to_pocket: the target pocket (as a string). param to_series: the target distroseries (as a string). param from_series: the source distroseries (as a string). param include_binaries: optional boolean, controls whether or not the published binaries for each given source should also be copied along with the source. param person: the IPerson who requests the sync. param sponsored: the IPerson who is being sponsored. Specifying this will ensure that the person's email address is used as the \"From:\" on the announcement email and will also be recorded as the creator of the new source publication. param unembargo: if True, allow copying restricted files from a private archive to a public archive, and re-upload them to the public librarian when doing so. param auto_approve: if True and the IPerson requesting the sync has queue admin permissions on the target, accept the copies immediately rather than setting it to unapproved. param silent: Suppress any emails that the copy would generate. Only usable with queue admin permissions on the target. raises NoSuchSourcePackageName: if the source name is invalid raises PocketNotFound: if the pocket name is invalid raises NoSuchDistroSeries: if the distro series name is invalid raises CannotCopy: if there is a problem copying."
      operationId: archive-copyPackages
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                source_names:
                  type: string
                  description: Source package names
                  example: source_names
                from_archive:
                  type: string
                  format: uri
                  x-lp-resource-type: archive
                  example: from_archive
                to_pocket:
                  type: string
                  description: Pocket name
                  example: to_pocket
                to_series:
                  type: string
                  description: Distroseries name The distro series to copy packages into.
                from_series:
                  type: string
                  description: Distroseries name The distro series to copy packages from.
                include_binaries:
                  type: string
                  description: Include Binaries Whether or not to copy binaries already built for this source
                sponsored:
                  type: string
                  format: uri
                  x-lp-resource-type: person
                  description: Sponsored Person The person who is being sponsored for this copy.
                unembargo:
                  type: string
                  description: Unembargo restricted files
                auto_approve:
                  type: string
                  description: Automatic approval Automatically approve this copy (queue admins only).
                silent:
                  type: string
                  description: Silent Don't notify anyone about this copy. For use by queue admins only.
              required:
                - source_names
                - from_archive
                - to_pocket
      parameters:
        - *a4
        - *a5
      responses:
        "200":
          description: Successful response
